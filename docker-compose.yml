version: "3.9"

services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # Override host/port for the in-network service names.
      # (Inside compose the app reaches these by service name, not localhost.)
      PORT: 5000
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apppassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
