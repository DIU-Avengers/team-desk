<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team Avengers</title>
  <style>
    :root {
      --bg: #0f1115;
      --fg: #e8e8ea;
      --muted: #9aa0a6;
      --accent: #4f8cff;
      --border: #22262e;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --fg: #14161a;
        --muted: #5f6368;
        --accent: #1f6feb;
        --border: #e5e7eb;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: var(--bg);
      color: var(--fg);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    main { max-width: 34rem; width: 100%; }
    h1 { font-size: 2.25rem; margin: 0 0 .5rem; letter-spacing: -0.02em; }
    p.lead { color: var(--muted); margin: 0 0 2rem; }
    ul { list-style: none; padding: 0; margin: 0; }
    li + li { margin-top: .5rem; }
    a.endpoint {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: .75rem 1rem;
      border: 1px solid var(--border);
      border-radius: .5rem;
      color: inherit;
      text-decoration: none;
    }
    a.endpoint:hover { border-color: var(--accent); }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--accent); }
    span.desc { color: var(--muted); font-size: .9rem; }
    footer { margin-top: 2rem; color: var(--muted); font-size: .85rem; }
  </style>
</head>
<body>
  <main>
    <h1>Team Avengers</h1>
    <p class="lead">A Flask service backed by PostgreSQL and Redis.</p>

    <ul>
      <li>
        <a class="endpoint" href="/">
          <code>GET /</code>
          <span class="desc">Visit counter &amp; service status</span>
        </a>
      </li>
      <li>
        <a class="endpoint" href="/health">
          <code>GET /health</code>
          <span class="desc">This page</span>
        </a>
      </li>
      <li>
        <a class="endpoint" href="/about-us">
          <code>GET /about-us</code>
          <span class="desc">Team members</span>
        </a>
      </li>
    </ul>

    <footer>Running on Flask &middot; Deployed with Docker</footer>
  </main>
</body>
</html>
