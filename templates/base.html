<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
   <title>{{ title or "Team Avengers" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}" />
</head>
<body class="bg-gray-900 text-white">
  <!-- Navbar -->
  <nav class="navbar bg-gray-800/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-700">
    <div class="navbar-end">
        <a href="/" class="text-xl font-bold text-yellow-400">⚡ DIU Avengers</a>
      </div>
    <div class="container mx-auto px-4">
      
      <div class="navbar-start">
        
        <ul class="menu menu-horizontal px-1 gap-2">
          <li><a href="/" class="text-gray-300 hover:text-yellow-400 transition-colors">Home</a></li>
          <li><a href="/about-us" class="text-gray-300 hover:text-yellow-400 transition-colors">About</a></li>
          <li><a href="/contact" class="text-gray-300 hover:text-yellow-400 transition-colors">Contact</a></li>
        </ul>
      </div>
      
    </div>
  </nav>

  <!-- Main Content -->
  {% block content %}{% endblock %}

  <!-- Footer -->
  <footer class="bg-gray-800 border-t border-gray-700 py-8">
    <div class="container mx-auto px-4 text-center text-gray-400">
      <p>DIU Avengers &copy; 2026. All rights reserved.</p>
      <p class="text-sm mt-2">Powered by Flask, PostgreSQL & Redis</p>
    </div>


    </footer>
</body>
</html>
