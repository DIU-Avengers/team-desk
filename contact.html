<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      margin: 0;
      padding: 0;
    }
    header {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 20px 0;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
    }
    .team {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .member {
      background: #ecf0f1;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
      transition: transform 0.2s;
    }
    .member:hover {
      transform: scale(1.05);
      background: #dfe6e9;
    }
    footer {
      text-align: center;
      padding: 15px;
      background: #2c3e50;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Contact Us</h1>
    <p>We’d love to hear from you!</p>
  </header>

  <div class="container">
    <h2>Our Team</h2>
    <div class="team">
      <div class="member">
        <h3>Tamzidul Haque</h3>
        <p>Team Member</p>
      </div>
      <div class="member">
        <h3>Puja Chowdhury</h3>
        <p>Team Member</p>
      </div>
      <div class="member">
        <h3>Shagato Chowdhury</h3>
        <p>Team Member</p>
      </div>
      <div class="member">
        <h3>Umma Iman Monea</h3>
        <p>Team Member</p>
      </div>
      <div class="member">
        <h3>Tamima Rahman</h3>
        <p>Team Member</p>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Your Website Name. All rights reserved.</p>
  </footer>

</body>
</html>
